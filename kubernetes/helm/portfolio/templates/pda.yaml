apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: client-pdb
  namespace: default
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: client
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: server-pdb
  namespace: default
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: server