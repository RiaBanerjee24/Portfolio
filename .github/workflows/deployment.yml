name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_FRONTEND: riabanerjee/portfolio/frontend
  ECR_REPOSITORY_BACKEND: riabanerjee/portfolio/backend

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Builds on BOTH push and PR
      - name: Build frontend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG \
            -f frontend/Dockerfile ./frontend

      - name: Build backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG \
            -f backend/Dockerfile ./backend

      # Pushes ONLY on merge to main
      - name: Push frontend image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG \
                     $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:latest

      - name: Push backend image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG \
                     $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:latest

  deploy-ec2:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Write docker-compose.yml from repo (kept in sync on every deploy)
            cat > /home/ec2-user/docker-compose.yml << 'COMPOSEEOF'
            services:
              frontend:
                build: ./frontend
                image: 535002893779.dkr.ecr.us-east-1.amazonaws.com/riabanerjee/portfolio/frontend:latest
                ports:
                  - "80:80"
                  - "443:443"
                volumes:
                  - ${CERTS_DIR:-./frontend/certs}:/etc/nginx/certs:ro
                depends_on:
                  - backend
                networks:
                  - app-net
                restart: unless-stopped

              backend:
                build: ./backend
                image: 535002893779.dkr.ecr.us-east-1.amazonaws.com/riabanerjee/portfolio/backend:latest
                env_file:
                  - .env
                networks:
                  - app-net
                restart: unless-stopped

            networks:
              app-net:
                driver: bridge
            COMPOSEEOF

            # Write fresh .env file from GitHub Secrets
            cat > /home/ec2-user/.env << 'ENVEOF'
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            PORT=5002
            CERTS_DIR=/etc/portfolio-certs
            ENVEOF

            # Login to ECR
            aws ecr get-login-password --region us-east-1 | \
              docker login --username AWS --password-stdin \
              535002893779.dkr.ecr.us-east-1.amazonaws.com

            # Pull latest images
            docker pull 535002893779.dkr.ecr.us-east-1.amazonaws.com/riabanerjee/portfolio/frontend:latest
            docker pull 535002893779.dkr.ecr.us-east-1.amazonaws.com/riabanerjee/portfolio/backend:latest

            # Restart containers
            cd /home/ec2-user
            docker compose up -d

            # Cleanup old images
            docker image prune -f
